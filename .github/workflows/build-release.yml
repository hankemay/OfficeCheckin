name: Build macOS app

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build release app
        run: zsh scripts/build-release.sh

      - name: Upload installable app
        uses: actions/upload-artifact@v4
        with:
          name: OfficeCheckin-macOS
          path: release/OfficeCheckin-macOS.zip
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/OfficeCheckin-macOS.zip --generate-notes
